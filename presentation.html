<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSET-3 Interactive Study Guide</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f172a;
            --surface: #111827;
            --surface-2: #1f2937;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
            --link: #7dd3fc;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: radial-gradient(circle at top right, #1e293b 0%, var(--bg) 45%, #020617 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            padding: 1.25rem;

        }
        body > div, main {
            width: min(900px, 100% - 1rem);
            background: linear-gradient(180deg, rgba(15,23,42,0.95), rgba(17,24,39,0.95));
            border: 1px solid var(--border);
            border-radius: 14px;
            box-shadow: 0 10px 35px rgba(0,0,0,0.45);
            padding: 1.2rem 1.3rem;
        }
        h1 {
            color: #f8fafc;
            margin-top: 0;
            letter-spacing: -0.02em;
        }
        p {
            color: var(--text);
            margin: .8rem 0;
        }
        a {
            color: var(--link);
            text-decoration: none;
            border-bottom: 1px dashed rgba(125,211,252,0.6);
        }
        a:hover { color: #cbd5e1; border-bottom-color: #cbd5e1; }
        a.btn {display: inline-block; background-color: var(--accent); color: var(--bg); padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; text-decoration: none; border: none; 
            transition: background-color 0.2s; 
            margin:20px auto;}
        section{
            max-width: 900px;
             margin: 0 auto;
        }
        .screenshot-grid {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
            margin: 1.5rem 0;
        }
        img {
            width: 100%;
            display: block;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        @media (max-width: 900px) {
            .screenshot-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <section>
    <div style="position: relative; width: 100%; padding-top: 56.18%; overflow: hidden;">
  <iframe
    scrolling="no"
    frameborder="0"
    style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;"
    src="https://app.screencast.com/JoXQg75ehb10l/e"
    allowfullscreen>
  </iframe>
</div>
</section>

</body>
</html>
